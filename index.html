<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Панель звуков | Просто для учителя</title>
    <style>
        /* =========================================
           ОБЩИЕ СТИЛИ И ПЕРЕМЕННЫЕ
           ========================================= */
        :root {
            --bg: #f4f7f6;
            --text: #333;
            --primary: #8a2be2;
            --panel: #fff;
            --border: #ddd;
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: transparent; /* Прозрачный фон для виджета */
            overflow: hidden;
        }

        /* =========================================
           СТИЛИ РЕДАКТОРА (Скрываются в виджете)
           ========================================= */
        #editor-container {
            display: none; background-color: var(--bg); color: var(--text);
            width: 100%; height: 100%; padding: 20px; box-sizing: border-box;
            overflow-y: auto; align-items: center; flex-direction: column;
        }

        .panel-box {
            max-width: 900px; width: 100%; background: var(--panel);
            padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            box-sizing: border-box;
        }

        h1 { text-align: center; margin-top: 0; color: var(--primary); margin-bottom: 30px;}

        .layout { display: flex; gap: 40px; flex-wrap: wrap; }
        .controls { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 20px; }
        .preview { flex: 1; min-width: 300px; display: flex; flex-direction: column; align-items: center; }

        .preview-box {
            width: 100%; max-width: 350px; aspect-ratio: 1/1;
            border: 2px dashed var(--border); border-radius: 16px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"><rect width="10" height="10" fill="%23eee"/><rect x="10" y="10" width="10" height="10" fill="%23eee"/></svg>');
            position: relative; overflow: hidden; resize: both;
        }

        .preview-box iframe { width: 100%; height: 100%; border: none; }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: 600; font-size: 14px; }
        
        input[type="color"] { width: 100%; height: 45px; border: none; border-radius: 8px; cursor: pointer; padding: 0; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid var(--border); border-radius: 8px; }
        
        .checkbox-group { display: flex; align-items: center; gap: 10px; cursor: pointer; background: #f9f9f9; padding: 12px; border-radius: 8px; border: 1px solid var(--border);}
        .checkbox-group input { width: 20px; height: 20px; cursor: pointer; }

        .btn-group { display: flex; gap: 10px; }
        button {
            flex: 1; background-color: var(--primary); color: white; border: none;
            padding: 14px 20px; border-radius: 8px; font-size: 15px;
            font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        button:hover { filter: brightness(1.1); }
        button.secondary { background-color: #6c757d; }

        textarea {
            width: 100%; height: 100px; padding: 12px; border-radius: 8px;
            border: 1px solid var(--border); font-family: monospace;
            font-size: 13px; resize: vertical; box-sizing: border-box; background: #f4f7f6;
            color: #555; line-height: 1.5;
        }

        footer {
            margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border);
            text-align: center; font-size: 13px; color: #777;
            display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        .social-links { display: flex; gap: 15px; }
        .social-links a { color: #777; text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color 0.2s; font-weight: 500;}
        .social-links a:hover { color: var(--primary); }
        .social-links svg { width: 20px; height: 20px; fill: currentColor; }

        /* =========================================
           СТИЛИ ВИДЖЕТА (САМА ПАНЕЛЬ) - VMIN
           ========================================= */
        #widget-container {
            display: none; width: 100%; height: 100%;
            justify-content: center; align-items: center;
        }

        .sound-board {
            width: 90vmin; height: 90vmin;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 0.5vmin solid rgba(255,255,255,0.4);
            border-radius: 8vmin;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 4vmin;
            padding: 5vmin;
            box-sizing: border-box;
            box-shadow: 0 4vmin 8vmin rgba(0,0,0,0.1), inset 0 2vmin 4vmin rgba(255,255,255,0.5);
        }

        .sound-btn {
            position: relative;
            border: none; outline: none;
            border-radius: 6vmin;
            cursor: pointer;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 1.5vmin;
            transition: transform 0.1s, box-shadow 0.1s, filter 0.3s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .sound-btn svg {
            width: 14vmin; height: 14vmin;
            fill: white;
            filter: drop-shadow(0 0.5vmin 0.5vmin rgba(0,0,0,0.2));
        }

        .sound-btn span {
            color: white; font-size: 3.5vmin; font-weight: 800;
            text-shadow: 0 0.5vmin 1vmin rgba(0,0,0,0.3);
            text-transform: uppercase; letter-spacing: 0.2vmin;
        }

        /* 3D эффект нажимания */
        .sound-btn:active {
            transform: translateY(2vmin) !important;
        }
    </style>
</head>
<body>

<!-- РЕЖИМ РЕДАКТОРА -->
<div id="editor-container">
    <div class="panel-box">
        <h1>Панель звуков</h1>
        <div class="layout">
            <div class="controls">
                <div class="control-group">
                    <label for="colorPicker">Основной цвет 3D-кнопок</label>
                    <input type="color" id="colorPicker" value="#ff4757">
                </div>
                <label class="checkbox-group">
                    <input type="checkbox" id="neonToggle">
                    <span style="font-weight: 600; font-size: 15px;">Включить неоновое свечение</span>

                <div style="height: 10px;"></div>

                <div class="btn-group">

                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>

                </div>
                
                <div class="control-group">

            <div class="preview">

                <p style="font-size: 13px; color: #777; margin-top: 15px; text-align: center; line-height: 1.4;">

        </div>

        <footer>

            <div class="social-links">
                <a href="https://t.me/easyfrbusy" target="_blank" rel="noopener">

                    Telegram
                </a>
                <a href="https://vk.com/easyfrbusy" target="_blank" rel="noopener">
                    <svg viewBox="0 0 24 24"><path d="M15.07 2H8.93C3.33 2 2 3.33 2 8.93v6.14C2 20.67 3.33 22 8.93 22h6.14c5.6 0 6.93-1.33 6.93-6.93V8.93C22 3.33 20.67 2 15.07 2zM17.46 16.35h-1.56c-.66 0-.84-.52-1.98-1.64-1.03-1-1.5-1.15-1.75-1.15-.34 0-.44.1-.44.6v1.44c0 .46-.14.75-1.4.75-2.06 0-4.32-1.25-5.91-3.52-2.39-3.41-3.03-5.99-3.03-6.42 0-.21.08-.42.5-.42h1.56c.4 0 .56.18.73.66 1.09 3.23 2.65 5.56 3.36 5.56.25 0 .36-.1.36-.61V8.67c-.05-1.09-.61-1.18-.61-1.56 0-.19.16-.4.44-.4h2.51c.36 0 .48.18.48.58v3.42c0 .48.22.61.36.61.25 0 .54-.14 1.15-.75 1.18-1.28 1.95-3.32 1.95-3.32.12-.34.34-.58.75-.58h1.56c.54 0 .66.28.56.66-.23 1.06-1.55 2.85-2.18 3.66-.41.52-.52.68 0 1.2 1.55 1.53 2.16 2.5 2.16 3.5 0 .38-.28.66-.99.66z"/></svg>
                    ВКонтакте
                </a>
            </div>
        </footer>
    </div>
</div>

<!-- РЕЖИМ ВИДЖЕТА -->
<div id="widget-container">
    <div class="sound-board">
        <button class="sound-btn" onclick="playSound('win')">
            <!-- Кубок -->
            <svg viewBox="0 0 24 24"><path d="M12 20.1l-5.6 3.2 1.4-6.4-4.9-4.3 6.6-.6L12 6l2.5 6.1 6.6.6-4.9 4.3 1.4 6.4L12 20.1zM12 2L9 8H2l5 4.5L5 20l7-4 7 4-2-7.5L22 8h-7L12 2z" opacity="0.3"/><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94A5.01 5.01 0 0011 15.9V19H7v2h10v-2h-4v-3.1a5.01 5.01 0 003.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z"/></svg>
            <span>Победа</span>
        </button>
        <button class="sound-btn" onclick="playSound('lose')">
            <!-- Крестик / Фейл -->
            <svg viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/></svg>
            <span>Провал</span>
        </button>
        <button class="sound-btn" onclick="playSound('drum')">
            <!-- Барабан (Огонь/Энергия) -->
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
            <span>Дробь</span>
        </button>
        <button class="sound-btn" onclick="playSound('applause')">
            <!-- Звезда / Аплодисменты -->
            <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            <span>Браво</span>
        </button>
    </div>
</div>

<script>
    // ==========================================
    // ЛОГИКА ГЕНЕРАЦИИ ЗВУКОВ (WEB AUDIO API)
    // ==========================================
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
        if (!audioCtx) audioCtx = new AudioContext();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    // Вспомогательная функция для нот
    function playTone(freq, type, time, dur, vol) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime + time);
        gain.gain.setValueAtTime(0, audioCtx.currentTime + time);
        gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + time + dur*0.1);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + time + dur);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime + time);
        osc.stop(audioCtx.currentTime + time + dur);
    }

    // Создание шума для барабана и аплодисментов
    function createNoiseBuffer(duration) {
        const bufferSize = audioCtx.sampleRate * duration;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
        }
        return buffer;
    }

    function playSound(type) {
        initAudio();
        const t = audioCtx.currentTime;

        if (type === 'win') {
            // Фанфары победы (C4, E4, G4, C5)
            playTone(261.63, 'square', 0, 0.15, 0.1);
            playTone(329.63, 'square', 0.15, 0.15, 0.1);
            playTone(392.00, 'square', 0.3, 0.15, 0.1);
            playTone(523.25, 'square', 0.45, 0.6, 0.15);
        } 
        else if (type === 'lose') {
            // Грустный тромбон
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            
            osc.frequency.setValueAtTime(300, t);
            osc.frequency.exponentialRampToValueAtTime(150, t + 0.4);
            osc.frequency.setValueAtTime(150, t + 0.4);
            osc.frequency.exponentialRampToValueAtTime(80, t + 1.2);

            gain.gain.setValueAtTime(0.1, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
            
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(t); osc.stop(t + 1.2);
        }
        else if (type === 'drum') {
            // Барабанная дробь (серия шумовых ударов)
            const noise = audioCtx.createBufferSource();
            noise.buffer = createNoiseBuffer(1.5);
            const noiseFilter = audioCtx.createBiquadFilter();
            noiseFilter.type = 'lowpass';
            noiseFilter.frequency.value = 1000;
            const noiseGain = audioCtx.createGain();
            
            noiseGain.gain.setValueAtTime(0, t);
            for(let i=0; i<15; i++) {
                noiseGain.gain.linearRampToValueAtTime(0.2, t + i*0.1);
                noiseGain.gain.linearRampToValueAtTime(0.01, t + i*0.1 + 0.05);
            }
            noiseGain.gain.linearRampToValueAtTime(0.3, t + 1.5); // финальный удар
            noiseGain.gain.exponentialRampToValueAtTime(0.001, t + 2.0);

            noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(audioCtx.destination);
            noise.start(t);
        }
        else if (type === 'applause') {
            // Аплодисменты (отфильтрованный белый шум с нарастанием)
            const noise = audioCtx.createBufferSource();
            noise.buffer = createNoiseBuffer(3);
            
            const bandpass = audioCtx.createBiquadFilter();
            bandpass.type = 'bandpass';
            bandpass.frequency.value = 1200;
            
            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.15, t + 0.5); // нарастание
            gain.gain.setValueAtTime(0.15, t + 2);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 3); // затухание

            noise.connect(bandpass); bandpass.connect(gain); gain.connect(audioCtx.destination);
            noise.start(t);
        }
    }

    // ==========================================
    // ЛОГИКА РОУТИНГА И РЕДАКТОРА
    // ==========================================
    
    // Вспомогательная функция для затемнения цвета (создание 3D тени)
    function darkenColor(hex, percent) {
        let r = parseInt(hex.substring(1,3), 16);
        let g = parseInt(hex.substring(3,5), 16);
        let b = parseInt(hex.substring(5,7), 16);
        r = parseInt(r * (100 - percent) / 100);
        g = parseInt(g * (100 - percent) / 100);
        b = parseInt(b * (100 - percent) / 100);
        return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
    }

    const urlParams = new URLSearchParams(window.location.search);
    const configParam = urlParams.get('config');

    if (configParam) {
        // РЕЖИМ ВИДЖЕТА (Панель звуков)
        document.getElementById('widget-container').style.display = 'flex';
        try {
            const config = JSON.parse(decodeURIComponent(atob(configParam)));
            const color = config.c || '#ff4757';
            const neon = config.n || false;
            
            const darkColor = darkenColor(color, 25); // Темный оттенок для 3D
            const buttons = document.querySelectorAll('.sound-btn');
            
            buttons.forEach(btn => {
                btn.style.backgroundColor = color;
                
                if (neon) {
                    // Неоновый стиль с 3D
                    btn.style.boxShadow = `0 1.5vmin 0 ${darkColor}, 0 2vmin 4vmin ${color}`;
                    // Чтобы при нажатии тень пропадала и кнопка опускалась
                    btn.onmousedown = () => btn.style.boxShadow = `0 0vmin 0 ${darkColor}, 0 0 2vmin ${color}`;
                    btn.onmouseup = () => btn.style.boxShadow = `0 1.5vmin 0 ${darkColor}, 0 2vmin 4vmin ${color}`;
                    btn.onmouseleave = btn.onmouseup;
                    
                    btn.addEventListener('touchstart', btn.onmousedown, {passive: true});
                    btn.addEventListener('touchend', btn.onmouseup, {passive: true});
                } else {
                    // Классический 3D стиль
                    btn.style.boxShadow = `0 1.5vmin 0 ${darkColor}, 0 2vmin 3vmin rgba(0,0,0,0.3)`;
                    btn.onmousedown = () => btn.style.boxShadow = `0 0vmin 0 ${darkColor}, 0 0 1vmin rgba(0,0,0,0.3)`;
                    btn.onmouseup = () => btn.style.boxShadow = `0 1.5vmin 0 ${darkColor}, 0 2vmin 3vmin rgba(0,0,0,0.3)`;
                    btn.onmouseleave = btn.onmouseup;
                    
                    btn.addEventListener('touchstart', btn.onmousedown, {passive: true});
                    btn.addEventListener('touchend', btn.onmouseup, {passive: true});
                }
            });
        } catch(e) {
            console.error("Ошибка конфигурации", e);
        }

    } else {
        // РЕЖИМ РЕДАКТОРА
        document.getElementById('editor-container').style.display = 'flex';

        const colorPicker = document.getElementById('colorPicker');
        const neonToggle = document.getElementById('neonToggle');
        const previewFrame = document.getElementById('previewFrame');
        const codeOutput = document.getElementById('codeOutput');
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');

        const baseUrl = window.location.href.split('?')[0];

        function getConfigHash() {
            const configObj = { c: colorPicker.value, n: neonToggle.checked };
            return btoa(encodeURIComponent(JSON.stringify(configObj)));
        }

        function updatePreview() {
            const hash = getConfigHash();
            previewFrame.src = `${baseUrl}?config=${hash}`;
            generateIframe(); // Автоматически обновляем код при изменении
        }

        function generateIframe() {
            const hash = getConfigHash();
            const iframeUrl = `${baseUrl}?config=${hash}`;
            // Код адаптивный, можно тянуть за углы внутри Miro/Genially
            const iframeCode = `<iframe src="${iframeUrl}" width="400" height="400" style="width: 100%; height: 100%; min-width: 200px; min-height: 200px;" frameborder="0" allowtransparency="true"></iframe>`;
            codeOutput.value = iframeCode;
        }

        function copyToClipboard() {
            codeOutput.select();
            document.execCommand('copy');
            
            // Визуальный отклик кнопки
            const originalText = copyBtn.innerHTML;
            copyBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Скопировано!';
            copyBtn.style.backgroundColor = '#28a745';
            
            setTimeout(() => {
                copyBtn.innerHTML = originalText;
                copyBtn.style.backgroundColor = '';
            }, 2000);
        }

        colorPicker.addEventListener('input', updatePreview);
        neonToggle.addEventListener('change', updatePreview);
        generateBtn.addEventListener('click', updatePreview);
        copyBtn.addEventListener('click', copyToClipboard);

        // Инициализация при загрузке
        updatePreview();
    }
</script>
</body>
