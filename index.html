<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Панель звуков | Просто для учителя</title>
    <style>
        /* =========================================
           ОБЩИЕ СТИЛИ И ПЕРЕМЕННЫЕ
           ========================================= */
        :root {
            --bg: #f4f7f6;
            --text: #333;
            --primary: #8a2be2;
            --panel: #fff;
            --border: #ddd;
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: transparent; 
            overflow: hidden;
        }

        /* =========================================
           СТИЛИ РЕДАКТОРА (Скрываются в виджете)
           ========================================= */
        #editor-container {
            display: none; background-color: var(--bg); color: var(--text);
            width: 100%; height: 100%; padding: 20px; box-sizing: border-box;
            overflow-y: auto; align-items: center; flex-direction: column;
        }

        .panel-box {
            max-width: 900px; width: 100%; background: var(--panel);
            padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            box-sizing: border-box;
        }

        h1 { text-align: center; margin-top: 0; color: var(--primary); margin-bottom: 30px;}

        .layout { display: flex; gap: 40px; flex-wrap: wrap; }
        .controls { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 20px; }
        .preview { flex: 1; min-width: 300px; display: flex; flex-direction: column; align-items: center; }

        .preview-box {
            width: 100%; max-width: 350px; aspect-ratio: 1/1;
            border: 2px dashed var(--border); border-radius: 16px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"><rect width="10" height="10" fill="%23eee"/><rect x="10" y="10" width="10" height="10" fill="%23eee"/></svg>');
            position: relative; overflow: hidden; resize: both;
        }

        .preview-box iframe { width: 100%; height: 100%; border: none; }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: 600; font-size: 14px; }
        
        input[type="color"] { width: 100%; height: 45px; border: none; border-radius: 8px; cursor: pointer; padding: 0; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid var(--border); border-radius: 8px; }
        
        .checkbox-group { display: flex; align-items: center; gap: 10px; cursor: pointer; background: #f9f9f9; padding: 12px; border-radius: 8px; border: 1px solid var(--border);}
        .checkbox-group input { width: 20px; height: 20px; cursor: pointer; }

        button.action-btn {
            width: 100%; background-color: var(--primary); color: white; border: none;
            padding: 14px 20px; border-radius: 8px; font-size: 15px;
            font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        button.action-btn:hover { filter: brightness(1.1); }

        textarea {
            width: 100%; height: 100px; padding: 12px; border-radius: 8px;
            border: 1px solid var(--border); font-family: monospace;
            font-size: 13px; resize: vertical; box-sizing: border-box; background: #f4f7f6;
            color: #555; line-height: 1.5;
        }

        footer {
            margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border);
            text-align: center; font-size: 13px; color: #777;
            display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        .social-links { display: flex; gap: 15px; }
        .social-links a { color: #777; text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color 0.2s; font-weight: 500;}
        .social-links a:hover { color: var(--primary); }
        .social-links svg { width: 20px; height: 20px; fill: currentColor; }

        /* =========================================
           СТИЛИ ВИДЖЕТА (САМА ПАНЕЛЬ) - VMIN
           ========================================= */
        #widget-container {
            display: none; width: 100%; height: 100%;
            justify-content: center; align-items: center;
        }

        .sound-board {
            width: 90vmin; height: 90vmin;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 0.5vmin solid rgba(255,255,255,0.4);
            border-radius: 8vmin;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 4vmin;
            padding: 5vmin;
            box-sizing: border-box;
            box-shadow: 0 4vmin 8vmin rgba(0,0,0,0.1), inset 0 2vmin 4vmin rgba(255,255,255,0.5);
            transition: box-shadow 0.3s, border-color 0.3s;
        }

        .sound-btn {
            position: relative;
            border: none; outline: none;
            border-radius: 6vmin;
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.1s, box-shadow 0.1s, filter 0.3s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }

        /* 3D эффект нажимания */
        .sound-btn:active {
            transform: translateY(2vmin) !important;
        }

        /* СТИЛИ ДЛЯ ИКОНОК */
        .sound-btn svg {
            width: 22vmin; height: 22vmin;
            fill: white;
            filter: drop-shadow(0 0.5vmin 0.5vmin rgba(0,0,0,0.2));
            pointer-events: none;
        }

        /* Уменьшаем иконку проигрыша */
        .icon-lose {
            transform: scale(0.85);
        }

        /* Растровые картинки (Барабан и Хлопки) делаем белыми и прозрачными */
        .sound-btn img {
            width: 22vmin; height: 22vmin;
            object-fit: contain;
            filter: invert(1) contrast(1.2); 
            mix-blend-mode: screen; 
            pointer-events: none;
        }
    </style>
</head>
<body>

<!-- РЕЖИМ РЕДАКТОРА -->
<div id="editor-container">
    <div class="panel-box">
        <h1>Панель звуков</h1>
        <div class="layout">
            <div class="controls">
                <div class="control-group">
                    <label for="colorPicker">Основной цвет</label>
                    <input type="color" id="colorPicker" value="#ff4757">
                </div>
                <label class="checkbox-group">
                    <input type="checkbox" id="neonToggle">
                    <span style="font-weight: 600; font-size: 15px;">Включить неоновое свечение</span>
                </label>
                
                <div style="height: 10px;"></div>

                <button id="copyBtn" class="action-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    Скопировать код
                </button>
                
                <div class="control-group">
                    <label for="codeOutput">Код для вставки (Genially / Miro)</label>
                    <textarea id="codeOutput" readonly placeholder="Код генерируется автоматически..."></textarea>
                </div>
            </div>
            
            <div class="preview">
                <label style="margin-bottom: 10px;">Предпросмотр (интерактивный)</label>
                <div class="preview-box">
                    <iframe id="previewFrame" allowtransparency="true"></iframe>
                </div>
                <p style="font-size: 13px; color: #777; margin-top: 15px; text-align: center; line-height: 1.4;">
                    Нажимайте на кнопки, чтобы услышать звук!<br>Потяните окно за нижний правый угол, чтобы проверить 3D-масштабирование.
                </p>
            </div>
        </div>

        <footer>
            <div>Автор: <b>Кóденцева Алёна</b>, блог <i>Просто для учителя | Easy for busy</i></div>
            <div class="social-links">
                <a href="https://t.me/easyfrbusy" target="_blank" rel="noopener">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.19-.08-.05-.19-.02-.27 0-.12.03-1.96 1.25-5.54 3.67-.52.36-.99.53-1.41.52-.46-.01-1.35-.26-2.01-.48-.81-.27-1.46-.42-1.4-.88.03-.24.36-.49 1-.76 3.91-1.7 6.51-2.82 7.79-3.35 3.7-1.53 4.47-1.8 4.97-1.81.11 0 .35.03.5.15.12.1.16.23.17.33-.02.04-.02.13-.03.22z"/></svg>
                    Telegram
                </a>
                <a href="https://vk.com/easyfrbusy" target="_blank" rel="noopener">
                    <svg viewBox="0 0 24 24"><path d="M15.07 2H8.93C3.33 2 2 3.33 2 8.93v6.14C2 20.67 3.33 22 8.93 22h6.14c5.6 0 6.93-1.33 6.93-6.93V8.93C22 3.33 20.67 2 15.07 2zM17.46 16.35h-1.56c-.66 0-.84-.52-1.98-1.64-1.03-1-1.5-1.15-1.75-1.15-.34 0-.44.1-.44.6v1.44c0 .46-.14.75-1.4.75-2.06 0-4.32-1.25-5.91-3.52-2.39-3.41-3.03-5.99-3.03-6.42 0-.21.08-.42.5-.42h1.56c.4 0 .56.18.73.66 1.09 3.23 2.65 5.56 3.36 5.56.25 0 .36-.1.36-.61V8.67c-.05-1.09-.61-1.18-.61-1.56 0-.19.16-.4.44-.4h2.51c.36 0 .48.18.48.58v3.42c0 .48.22.61.36.61.25 0 .54-.14 1.15-.75 1.18-1.28 1.95-3.32 1.95-3.32.12-.34.34-.58.75-.58h1.56c.54 0 .66.28.56.66-.23 1.06-1.55 2.85-2.18 3.66-.41.52-.52.68 0 1.2 1.55 1.53 2.16 2.5 2.16 3.5 0 .38-.28.66-.99.66z"/></svg>
                    ВКонтакте
                </a>
            </div>
        </footer>
    </div>
</div>

<!-- РЕЖИМ ВИДЖЕТА -->
<div id="widget-container">
    <div class="sound-board" id="mainBoard">
        <button class="sound-btn" onclick="playSound('win')">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94A5.01 5.01 0 0011 15.9V19H7v2h10v-2h-4v-3.1a5.01 5.01 0 003.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z"/></svg>
        </button>
        <button class="sound-btn" onclick="playSound('lose')">
            <!-- Добавлен класс .icon-lose для уменьшения -->
            <svg class="icon-lose" viewBox="0 0 24 24" fill="currentColor"><path d="M15 3H6c-.83 0-1.54.5-1.84 1.22l-3.02 7.05c-.09.23-.14.47-.14.73v2c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L9.83 23l6.59-6.59c.36-.36.58-.86.58-1.41V5c0-1.1-.9-2-2-2zm4 0v12h4V3h-4z"/></svg>
        </button>
        <button class="sound-btn" onclick="playSound('drum')">
            <img src="https://img.icons8.com/ios11/1200/snare-drum.jpg" alt="Барабан">
        </button>
        <button class="sound-btn" onclick="playSound('applause')">
            <img src="https://img.icons8.com/sf-regular/1200/applause.jpg" alt="Аплодисменты">
        </button>
    </div>
</div>

<script>
    // ==========================================
    // ЛОГИКА ПРОИГРЫВАНИЯ MP3 ЗВУКОВ
    // ==========================================
    
    // Создаем аудио-объекты, указывая ссылки на загруженные файлы
    const audioFiles = {
        win: new Audio('win.mp3'),
        lose: new Audio('lose.mp3'),
        drum: new Audio('drum.mp3'),
        applause: new Audio('applause.mp3')
    };

    // Предзагружаем звуки для моментального срабатывания
    Object.values(audioFiles).forEach(audio => {
        audio.preload = 'auto';
    });

    function playSound(type) {
        const sound = audioFiles[type];
        if (sound) {
            // Сбрасываем на начало, чтобы звук можно было нажимать быстро несколько раз подряд
            sound.currentTime = 0;
            sound.play().catch(e => console.log("Браузер заблокировал звук:", e));
        }
    }

    // ==========================================
    // ЛОГИКА РОУТИНГА И ВИДЖЕТА
    // ==========================================
    
    function darkenColor(hex, percent) {
        let r = parseInt(hex.substring(1,3), 16);
        let g = parseInt(hex.substring(3,5), 16);
        let b = parseInt(hex.substring(5,7), 16);
        r = parseInt(r * (100 - percent) / 100);
        g = parseInt(g * (100 - percent) / 100);
        b = parseInt(b * (100 - percent) / 100);
        return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
    }

    const urlParams = new URLSearchParams(window.location.search);
    const configParam = urlParams.get('config');

    if (configParam) {
        document.getElementById('widget-container').style.display = 'flex';
        try {
            const config = JSON.parse(decodeURIComponent(atob(configParam)));
            const color = config.c || '#ff4757';
            const neon = config.n || false;
            
            const darkColor = darkenColor(color, 25);
            const board = document.getElementById('mainBoard');
            const buttons = document.querySelectorAll('.sound-btn');
            
            // Неоновое свечение для самой панели (подложки)
            if (neon) {
                board.style.boxShadow = `0 0 5vmin ${color}, inset 0 0 3vmin ${color}`;
                board.style.borderColor = color;
            }

            buttons.forEach(btn => {
                btn.style.backgroundColor = color;
                
                if (neon) {
                    btn.style.boxShadow = `0 1.5vmin 0 ${darkColor}, 0 2vmin 4vmin ${color}`;
                    btn.onmousedown = () => btn.style.boxShadow = `0 0vmin 0 ${darkColor}, 0 0 2vmin ${color}`;
                    btn.onmouseup = () => btn.style.boxShadow = `0 1.5vmin 0 ${darkColor}, 0 2vmin 4vmin ${color}`;
                } else {
                    btn.style.boxShadow = `0 1.5vmin 0 ${darkColor}, 0 2vmin 3vmin rgba(0,0,0,0.3)`;
                    btn.onmousedown = () => btn.style.boxShadow = `0 0vmin 0 ${darkColor}, 0 0 1vmin rgba(0,0,0,0.3)`;
                    btn.onmouseup = () => btn.style.boxShadow = `0 1.5vmin 0 ${darkColor}, 0 2vmin 3vmin rgba(0,0,0,0.3)`;
                }
                
                btn.onmouseleave = btn.onmouseup;
                
                // Поддержка Touch-экранов (доски, планшеты) + моментальное срабатывание
                btn.addEventListener('touchstart', (e) => { 
                    e.preventDefault(); 
                    btn.onmousedown(); 
                    playSound(btn.getAttribute('onclick').match(/'([^']+)'/)[1]); 
                }, {passive: false});
                btn.addEventListener('touchend', (e) => { 
                    e.preventDefault(); 
                    btn.onmouseup(); 
                }, {passive: false});
            });
        } catch(e) {
            console.error("Ошибка конфигурации", e);
        }

    } else {
        document.getElementById('editor-container').style.display = 'flex';
        const colorPicker = document.getElementById('colorPicker');
        const neonToggle = document.getElementById('neonToggle');
        const previewFrame = document.getElementById('previewFrame');
        const codeOutput = document.getElementById('codeOutput');
        const copyBtn = document.getElementById('copyBtn');
        const baseUrl = window.location.href.split('?')[0];

        function getConfigHash() {
            const configObj = { c: colorPicker.value, n: neonToggle.checked };
            return btoa(encodeURIComponent(JSON.stringify(configObj)));
        }

        function updatePreviewAndCode() {
            const hash = getConfigHash();
            previewFrame.src = `${baseUrl}?config=${hash}`;
            // Изменены min-width и min-height на 100px
            const iframeCode = `<iframe src="${baseUrl}?config=${hash}" width="400" height="400" style="width: 100%; height: 100%; min-width: 100px; min-height: 100px;" frameborder="0" allowtransparency="true"></iframe>`;
            codeOutput.value = iframeCode;
        }

        function copyToClipboard() {
            codeOutput.select();
            document.execCommand('copy');
            const originalText = copyBtn.innerHTML;
            copyBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Скопировано!';
            copyBtn.style.backgroundColor = '#28a745';
            setTimeout(() => { copyBtn.innerHTML = originalText; copyBtn.style.backgroundColor = ''; }, 2000);
        }

        colorPicker.addEventListener('input', updatePreviewAndCode);
        neonToggle.addEventListener('change', updatePreviewAndCode);
        copyBtn.addEventListener('click', copyToClipboard);
        
        updatePreviewAndCode();
    }
</script>
</body>
</html>
