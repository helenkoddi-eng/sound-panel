<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Панель звуков | Просто для учителя</title>
    <style>
        /* =========================================
           ОБЩИЕ СТИЛИ И ПЕРЕМЕННЫЕ
           ========================================= */
        :root {
            --bg: #f4f7f6;
            --text: #333;
            --primary: #8a2be2;
            --panel: #fff;
            --border: #ddd;
        }

        body, html {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: transparent; 
            overflow: hidden;
        }

        /* =========================================
           СТИЛИ РЕДАКТОРА (Скрываются в виджете)
           ========================================= */
        #editor-container {
            display: none; background-color: var(--bg); color: var(--text);
            width: 100%; height: 100%; padding: 20px; box-sizing: border-box;
            overflow-y: auto; align-items: center; flex-direction: column;
        }

        .panel-box {
            max-width: 900px; width: 100%; background: var(--panel);
            padding: 30px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            box-sizing: border-box;
        }

        h1 { text-align: center; margin-top: 0; color: var(--primary); margin-bottom: 30px;}

        .layout { display: flex; gap: 40px; flex-wrap: wrap; }
        .controls { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 20px; }
        .preview { flex: 1; min-width: 300px; display: flex; flex-direction: column; align-items: center; }

        .preview-box {
            width: 100%; max-width: 350px; aspect-ratio: 1/1;
            border: 2px dashed var(--border); border-radius: 16px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20"><rect width="10" height="10" fill="%23eee"/><rect x="10" y="10" width="10" height="10" fill="%23eee"/></svg>');
            position: relative; overflow: hidden; resize: both;
        }

        .preview-box iframe { width: 100%; height: 100%; border: none; }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: 600; font-size: 14px; }
        
        input[type="color"] { width: 100%; height: 45px; border: none; border-radius: 8px; cursor: pointer; padding: 0; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid var(--border); border-radius: 8px; }
        
        .checkbox-group { display: flex; align-items: center; gap: 10px; cursor: pointer; background: #f9f9f9; padding: 12px; border-radius: 8px; border: 1px solid var(--border);}
        .checkbox-group input { width: 20px; height: 20px; cursor: pointer; }

        button {
            width: 100%; background-color: var(--primary); color: white; border: none;
            padding: 14px 20px; border-radius: 8px; font-size: 15px;
            font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        button:hover { filter: brightness(1.1); }

        textarea {
            width: 100%; height: 100px; padding: 12px; border-radius: 8px;
            border: 1px solid var(--border); font-family: monospace;
            font-size: 13px; resize: vertical; box-sizing: border-box; background: #f4f7f6;
            color: #555; line-height: 1.5;
        }

        footer {
            margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border);
            text-align: center; font-size: 13px; color: #777;
            display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        .social-links { display: flex; gap: 15px; }
        .social-links a { color: #777; text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color 0.2s; font-weight: 500;}
        .social-links a:hover { color: var(--primary); }
        .social-links svg { width: 20px; height: 20px; fill: currentColor; }

        /* =========================================
           СТИЛИ ВИДЖЕТА (САМА ПАНЕЛЬ) - VMIN
           ========================================= */
        #widget-container {
            display: none; width: 100%; height: 100%;
            justify-content: center; align-items: center;
        }

        .sound-board {
            width: 90vmin; height: 90vmin;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 0.5vmin solid rgba(255,255,255,0.4);
            border-radius: 8vmin;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 4vmin;
            padding: 5vmin;
            box-sizing: border-box;
            box-shadow: 0 4vmin 8vmin rgba(0,0,0,0.1), inset 0 2vmin 4vmin rgba(255,255,255,0.5);
        }

        .sound-btn {
            position: relative;
            border: none; outline: none;
            border-radius: 6vmin;
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.1s, box-shadow 0.1s, filter 0.3s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Увеличенные иконки без текста */
        .sound-btn svg {
            width: 22vmin; height: 22vmin;
            fill: white;
            filter: drop-shadow(0 0.5vmin 0.5vmin rgba(0,0,0,0.2));
        }

        /* 3D эффект нажимания */
        .sound-btn:active {
            transform: translateY(2vmin) !important;
        }
    </style>
</head>
<body>

<!-- РЕЖИМ ВИДЖЕТА (Скрыт в редакторе) -->
<div id="widget-container">
    <div class="sound-board">
        <button class="sound-btn" onclick="playSound('win')">
            <!-- Кубок -->
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 5h-2V3H7v2H5c-1.1 0-2 .9-2 2v1c0 2.55 1.92 4.63 4.39 4.94A5.01 5.01 0 0011 15.9V19H7v2h10v-2h-4v-3.1a5.01 5.01 0 003.61-2.96C19.08 12.63 21 10.55 21 8V7c0-1.1-.9-2-2-2zM5 8V7h2v3.82C5.84 10.4 5 9.3 5 8zm14 0c0 1.3-.84 2.4-2 2.82V7h2v1z"/></svg>
        </button>
        <button class="sound-btn" onclick="playSound('lose')">
            <!-- Палец вниз -->
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15 3H6c-.83 0-1.54.5-1.84 1.22l-3.02 7.05c-.09.23-.14.47-.14.73v2c0 1.1.9 2 2 2h6.31l-.95 4.57-.03.32c0 .41.17.79.44 1.06L9.83 23l6.59-6.59c.36-.36.58-.86.58-1.41V5c0-1.1-.9-2-2-2zm4 0v12h4V3h-4z"/></svg>
        </button>
        <button class="sound-btn" onclick="playSound('drum')">
            <!-- Барабан -->
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C7 2 3 3.8 3 6v12c0 2.2 4 4 9 4s9-1.8 9-4V6c0-2.2-4-4-9-4zm0 6c-3.9 0-7-1.3-7-3s3.1-3 7-3 7 1.3 7 3-3.1 3-7 3zm7 2.3c-1.8 1-4.2 1.7-7 1.7s-5.2-.7-7-1.7V8.5c1.8 1 4.2 1.5 7 1.5s5.2-.5 7-1.5v2.3zM3 13.5c1.8 1 4.2 1.5 7 1.5s5.2-.5 7-1.5V16c0 1.1-2.7 2-7 2s-7-.9-7-2v-2.5z"/></svg>
        </button>
        <button class="sound-btn" onclick="playSound('applause')">
            <!-- Хлопающие ладони -->
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.5 1.5c-1.1 0-2 .9-2 2v6l-2-1c-.4-.2-.8-.2-1.1 0l-.9.9 3.5 3.5c.2.2.3.5.3.8v4.3c0 1.1.9 2 2 2h4.5c1 0 1.8-.7 2-1.6l1-5.5c.1-.5 0-1-.3-1.4-.3-.4-.7-.6-1.2-.6h-3.6V3.5c0-1.1-.9-2-2-2zM4.5 12c-1.1 0-2 .9-2 2v6c0 1.1.9 2 2 2h2c1.1 0 2-.9 2-2v-6c0-1.1-.9-2-2-2h-2z"/></svg>
        </button>

<script>
    // ==========================================
    // ЛОГИКА ГЕНЕРАЦИИ ЗВУКОВ (Улучшенный Web Audio API)
    // ==========================================
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;
    let sharedNoiseBuffer;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new AudioContext();
            // Заранее генерируем 5 секунд шума в буфер (чтобы не грузить процессор)
            const bufferSize = audioCtx.sampleRate * 5;
            sharedNoiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = sharedNoiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    // Создает узел шума
    function createNoiseNode() {
        const source = audioCtx.createBufferSource();
        source.buffer = sharedNoiseBuffer;
        source.loop = true;
        return source;
    }

    function playSound(type) {
        initAudio();
        const t = audioCtx.currentTime;

        if (type === 'win') {
            // Фанфары (аккорды на основе прямоугольной волны - как духовые)
            const notes = [
                { f: 392.00, t: 0.0, d: 0.15 }, // Соль (коротко)
                { f: 523.25, t: 0.15, d: 0.15 }, // До
                { f: 659.25, t: 0.30, d: 0.15 }, // Ми
                { f: 783.99, t: 0.45, d: 0.8 }   // Соль (тянется)
            ];

            notes.forEach(n => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.value = n.f;

                gain.gain.setValueAtTime(0, t + n.t);
                gain.gain.linearRampToValueAtTime(0.1, t + n.t + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, t + n.t + n.d);

                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(t + n.t); osc.stop(t + n.t + n.d);
            });
        } 
        else if (type === 'lose') {
            // Грустный тромбон (Wah-wah эффект + спуск по тональности)
            const notes = [
                { f: 349.23, t: 0, d: 0.4 },     // Фа
                { f: 329.63, t: 0.4, d: 0.4 },   // Ми
                { f: 311.13, t: 0.8, d: 0.4 },   // Ми-бемоль
                { f: 293.66, t: 1.2, d: 1.5, drop: 261.63 } // Ре сползает в До
            ];

            notes.forEach(n => {
                const osc = audioCtx.createOscillator();
                const filter = audioCtx.createBiquadFilter();
                const gain = audioCtx.createGain();

                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(n.f, t + n.t);
                if (n.drop) osc.frequency.exponentialRampToValueAtTime(n.drop, t + n.t + n.d);

                // Фильтр создает эффект сурдины (wah)
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(200, t + n.t);
                filter.frequency.linearRampToValueAtTime(1500, t + n.t + 0.1);
                filter.frequency.exponentialRampToValueAtTime(200, t + n.t + n.d);

                gain.gain.setValueAtTime(0, t + n.t);
                gain.gain.linearRampToValueAtTime(0.2, t + n.t + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, t + n.t + n.d);

                osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
                osc.start(t + n.t); osc.stop(t + n.t + n.d);
            });
        }
        else if (type === 'drum') {
            // Барабанная дробь (30 ударов + тарелка)
            let dur = 1.8;
            let hits = 30;
            
            // Функция одного удара малого барабана
            const hit = (time, vol) => {
                const osc = audioCtx.createOscillator();
                const oscGain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(250, time);
                osc.frequency.exponentialRampToValueAtTime(100, time + 0.1);
                oscGain.gain.setValueAtTime(vol * 0.5, time);
                oscGain.gain.exponentialRampToValueAtTime(0.01, time + 0.1);
                osc.connect(oscGain); oscGain.connect(audioCtx.destination);
                osc.start(time); osc.stop(time + 0.1);

                const noise = createNoiseNode();
                const noiseFilter = audioCtx.createBiquadFilter();
                const noiseGain = audioCtx.createGain();
                noiseFilter.type = 'highpass';
                noiseFilter.frequency.value = 800;
                noiseGain.gain.setValueAtTime(vol, time);
                noiseGain.gain.exponentialRampToValueAtTime(0.01, time + 0.15);
                noise.connect(noiseFilter); noiseFilter.connect(noiseGain); noiseGain.connect(audioCtx.destination);
                noise.start(time); noise.stop(time + 0.2);
            };

            for (let i = 0; i < hits; i++) {
                hit(t + (i * (dur / hits)), 0.1 + (i / hits) * 0.4); // Громкость нарастает
            }

            // Удар тарелки в конце
            const crashTime = t + dur;
            const noise = createNoiseNode();
            const crashFilter = audioCtx.createBiquadFilter();
            const crashGain = audioCtx.createGain();
            crashFilter.type = 'highpass';
            crashFilter.frequency.value = 4000;
            crashGain.gain.setValueAtTime(0.6, crashTime);
            crashGain.gain.exponentialRampToValueAtTime(0.001, crashTime + 2.5);
            noise.connect(crashFilter); crashFilter.connect(crashGain); crashGain.connect(audioCtx.destination);
            noise.start(crashTime); noise.stop(crashTime + 2.5);
        }
        else if (type === 'applause') {
            // Аплодисменты (Шум толпы + 150 отдельных хлопков)
            const dur = 4;

            // Базовый гул
            const roar = createNoiseNode();
            const roarFilter = audioCtx.createBiquadFilter();
            const roarGain = audioCtx.createGain();
            roarFilter.type = 'lowpass';
            roarFilter.frequency.value = 800;
            roarGain.gain.setValueAtTime(0, t);
            roarGain.gain.linearRampToValueAtTime(0.15, t + 1);
            roarGain.gain.setValueAtTime(0.15, t + dur - 1);
            roarGain.gain.exponentialRampToValueAtTime(0.001, t + dur);
            roar.connect(roarFilter); roarFilter.connect(roarGain); roarGain.connect(audioCtx.destination);
            roar.start(t); roar.stop(t + dur);

            // Отдельные звонкие хлопки
            for (let i = 0; i < 150; i++) {
                let clapTime = t + Math.random() * dur;
                let envelope = Math.sin((clapTime - t) / dur * Math.PI); 
                if (Math.random() > envelope + 0.1) continue;

                const clapNoise = createNoiseNode();
                const clapFilter = audioCtx.createBiquadFilter();
                const clapGain = audioCtx.createGain();
                
                clapFilter.type = 'bandpass';
                clapFilter.frequency.value = 1000 + Math.random() * 1500;
                
                let vol = (0.2 + Math.random() * 0.3) * envelope;
                
                clapGain.gain.setValueAtTime(0, clapTime);
                clapGain.gain.linearRampToValueAtTime(vol, clapTime + 0.005);
                clapGain.gain.exponentialRampToValueAtTime(0.001, clapTime + 0.1);
                
                clapNoise.connect(clapFilter); clapFilter.connect(clapGain); clapGain.connect(audioCtx.destination);
                clapNoise.start(clapTime); clapNoise.stop(clapTime + 0.15);
            }
        }
    }

    // ==========================================
    // ЛОГИКА РОУТИНГА И РЕДАКТОРА
    // ==========================================
    
    function darkenColor(hex, percent) {
        let r = parseInt(hex.substring(1,3), 16);
        let g = parseInt(hex.substring(3,5), 16);
        let b = parseInt(hex.substring(5,7), 16);
        r = parseInt(r * (100 - percent) / 100);
        g = parseInt(g * (100 - percent) / 100);
        b = parseInt(b * (100 - percent) / 100);
        return "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
    }

    const urlParams = new URLSearchParams(window.location.search);
    const configParam = urlParams.get('config');

    if (configParam) {
        // РЕЖИМ ВИДЖЕТА (Панель звуков)
        document.getElementById('widget-container').style.display = 'flex';
        try {
            const config = JSON.parse(decodeURIComponent(atob(configParam)));
            const color = config.c || '#ff4757';
            const neon = config.n || false;
            
            const darkColor = darkenColor(color, 25);
            const buttons = document.querySelectorAll('.sound-btn');
            
            buttons.forEach(btn => {
                btn.style.backgroundColor = color;
                
                if (neon) {
                    btn.style.boxShadow = `0 1.5vmin 0 ${darkColor}, 0 2vmin 4vmin ${color}`;
                    btn.onmousedown = () => btn.style.boxShadow = `0 0vmin 0 ${darkColor}, 0 0 2vmin ${color}`;
                    btn.onmouseup = () => btn.style.boxShadow = `0 1.5vmin 0 ${darkColor}, 0 2vmin 4vmin ${color}`;
                    btn.onmouseleave = btn.onmouseup;
                    btn.addEventListener('touchstart', btn.onmousedown, {passive: true});
                    btn.addEventListener('touchend', btn.onmouseup, {passive: true});
                } else {
                    btn.style.boxShadow = `0 1.5vmin 0 ${darkColor}, 0 2vmin 3vmin rgba(0,0,0,0.3)`;
                    btn.onmousedown = () => btn.style.boxShadow = `0 0vmin 0 ${darkColor}, 0 0 1vmin rgba(0,0,0,0.3)`;
                    btn.onmouseup = () => btn.style.boxShadow = `0 1.5vmin 0 ${darkColor}, 0 2vmin 3vmin rgba(0,0,0,0.3)`;
                    btn.onmouseleave = btn.onmouseup;
                    btn.addEventListener('touchstart', btn.onmousedown, {passive: true});
                    btn.addEventListener('touchend', btn.onmouseup, {passive: true});
                }
            });
        } catch(e) {
            console.error("Ошибка конфигурации", e);
        }

    } else {
        // РЕЖИМ РЕДАКТОРА
        document.getElementById('editor-container').style.display = 'flex';

        const colorPicker = document.getElementById('colorPicker');
        const neonToggle = document.getElementById('neonToggle');
        const previewFrame = document.getElementById('previewFrame');
        const codeOutput = document.getElementById('codeOutput');
        const copyBtn = document.getElementById('copyBtn');

        const baseUrl = window.location.href.split('?')[0];

        function getConfigHash() {
            const configObj = { c: colorPicker.value, n: neonToggle.checked };
            return btoa(encodeURIComponent(JSON.stringify(configObj)));
        }

        function updatePreviewAndCode() {
            const hash = getConfigHash();
            previewFrame.src = `${baseUrl}?config=${hash}`;
            
            const iframeCode = `<iframe src="${baseUrl}?config=${hash}" width="400" height="400" style="width: 100%; height: 100%; min-width: 200px; min-height: 200px;" frameborder="0" allowtransparency="true"></iframe>`;
            codeOutput.value = iframeCode;
        }

        function copyToClipboard() {
            codeOutput.select();
            document.execCommand('copy');
            
            const originalText = copyBtn.innerHTML;
            copyBtn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Скопировано!';
            copyBtn.style.backgroundColor = '#28a745';
            
            setTimeout(() => {
                copyBtn.innerHTML = originalText;
                copyBtn.style.backgroundColor = '';
            }, 2000);
        }

        colorPicker.addEventListener('input', updatePreviewAndCode);
        neonToggle.addEventListener('change', updatePreviewAndCode);
        copyBtn.addEventListener('click', copyToClipboard);

        updatePreviewAndCode();
    }
</script>
</body>
</html>
